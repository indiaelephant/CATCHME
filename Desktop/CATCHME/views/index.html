<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>스마트 인솔 CATCHEME</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">CATHME</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav" id="navItems">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="#">Home</a>
          </li>
          <li class="nav-item" id="joinLink">
            <a class="nav-link" href="/join">회원가입</a>
          </li>
          <li class="nav-item" id="loginLink">
            <a class="nav-link" href="/login">로그인</a>
          </li>
          <li class="nav-item d-none" id="infoLink">
            <a class="nav-link" href="/memberinfo">나의 데이터</a>
          </li>
          <li class="nav-item d-none" id="logoutLink">
            <a class="nav-link" href="/logout">로그아웃</a>
          </li>
          <li class="nav-item d-none" id="deleteLink">
            <a class="nav-link" href="/memberdelete">회원탈퇴</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

  <script>
    // 로그인 상태 확인
    fetch('/login-status')
      .then(response => response.json())
      .then(data => {
        if (data.loggedIn) {
          document.getElementById('loginLink').classList.add('d-none'); //d-none으로 아이디가 loginLink인것 지움.
          document.getElementById('joinLink').classList.add('d-none');
          document.getElementById('logoutLink').classList.remove('d-none');
          document.getElementById('infoLink').classList.remove('d-none'); // "개인정보보기" 링크 보이기
          document.getElementById('deleteLink').classList.remove('d-none');
        }
      })
      .catch(error => console.error('Error:', error));
  </script>
</body>
</html>
